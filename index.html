<body>

<header style="background:#0d6efd;color:white;padding:15px;text-align:center;">
<h1>🛍️ KabKya</h1>
<p>Online Shopping Store</p>
</header>

<input id="search" type="text" placeholder="Search Products..."
style="width:90%;padding:10px;margin:15px;">

<h2 style="text-align:center;">Products</h2>

<div id="products" style="display:flex;flex-wrap:wrap;justify-content:center;"></div>

<h2 style="text-align:center;">🛒 Cart</h2>
<div id="cart" style="text-align:center;"></div>

<script>

const products=[
{name:"Smart Watch",price:999},
{name:"Headphones",price:799},
{name:"T-Shirt",price:499},
{name:"Beauty Kit",price:699},
{name:"Shoes",price:1299},
{name:"Mobile Cover",price:299}
];

let cart=[];

function showProducts(list){

let html="";

list.forEach((p,i)=>{

html+=`
<div style="background:white;width:220px;margin:10px;padding:15px;border-radius:10px;">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="addCart(${i})">
Add To Cart
</button>

<br><br>

<a href="https://wa.me/91YOURNUMBER?text=I want to buy ${p.name}">
Order WhatsApp
</a>

</div>
`;

});

document.getElementById("products").innerHTML=html;

}

function addCart(i){

cart.push(products[i]);

let text="";

let total=0;

cart.forEach(item=>{
text+=item.name+" - ₹"+item.price+"<br>";
total+=item.price;
});

text+="<br><b>Total = ₹"+total+"</b>";

document.getElementById("cart").innerHTML=text;

}

showProducts(products);

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filter=products.filter(x=>x.name.toLowerCase().includes(value));

showProducts(filter);

});

</script>

</body>
