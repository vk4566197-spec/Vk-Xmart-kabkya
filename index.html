<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KabKya Online Shopping</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2874f0;
color:white;
padding:20px;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

#search{
display:block;
width:90%;
max-width:500px;
margin:20px auto;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

#products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
width:220px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#2874f0;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

button:hover{
background:#0d47a1;
}

</style>
</head>

<body>

<header>

<h1>🛍️ KabKya</h1>

<p>India's Online Shopping Store</p>

<nav>

<a href="#">Home</a>

<a href="#">Products</a>

<a href="#">Categories</a>

<a href="#">Contact</a>

</nav>

</header>

<input id="search" placeholder="🔍 Search Products">

<div id="products"></div>

<h2 style="text-align:center;">🛒 Cart</h2>

<div id="cart" style="text-align:center;padding:20px;"></div>
<script>

const products=[
{name:"Smart Watch",price:999,img:"https://picsum.photos/220?1"},
{name:"Headphones",price:799,img:"https://picsum.photos/220?2"},
{name:"T-Shirt",price:499,img:"https://picsum.photos/220?3"},
{name:"Beauty Kit",price:699,img:"https://picsum.photos/220?4"},
{name:"Shoes",price:1299,img:"https://picsum.photos/220?5"},
{name:"Mobile Cover",price:299,img:"https://picsum.photos/220?6"}
];

let cart=[];

function showProducts(list){

let html="";

list.forEach((p)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p style="font-size:20px;color:#2874f0;">
₹${p.price}
</p>

<button onclick="addCart('${p.name}',${p.price})">
🛒 Add to Cart
</button>

<br><br>

<a href="https://wa.me/91YOURNUMBER?text=I want to buy ${p.name}">
Order on WhatsApp
</a>

</div>

`;

});

document.getElementById("products").innerHTML=html;}
function addCart(name,price){

cart.push({name,price});

let total=0;

cart.forEach(item=>{
total+=item.price;
});

document.getElementById("cart").innerHTML=
`
<b>Items:</b> ${cart.length}
<br>
<b>Total:</b> ₹${total}
`;

}

showProducts(products);

document.getElementById("search").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const result=products.filter(item=>
item.name.toLowerCase().includes(value)
);

showProducts(result);

});
  </script>

<footer style="background:#222;color:white;text-align:center;padding:15px;margin-top:30px;">
© 2026 KabKya | Made by Vishal
</footer>

</body>
</html>
