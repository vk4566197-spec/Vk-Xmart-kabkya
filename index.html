<body>
<header style="background:#0d6efd;color:white;padding:20px;text-align:center;">
<h1>🛍️ KabKya</h1>
<p>Online Shopping Store</p>
  <nav style="margin-top:15px;">
<a href="#" style="color:white;text-decoration:none;margin:10px;">Home</a>
<a href="#" style="color:white;text-decoration:none;margin:10px;">Products</a>
<a href="#" style="color:white;text-decoration:none;margin:10px;">Categories</a>
<a href="#" style="color:white;text-decoration:none;margin:10px;">Contact</a>
<a href="#" style="color:white;text-decoration:none;margin:10px;">Cart 🛒</a>
</nav>
</header>

<input id="search" type="text" placeholder="Search Products..."
style="width:90%;padding:12px;margin:15px;border-radius:8px;border:1px solid #ccc;">

<h2 style="text-align:center;">🔥 Featured Products</h2>

<div id="products" style="
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:15px;
">
</div>

<h2 style="text-align:center;">🛒 Cart</h2>
<div id="cart" style="text-align:center;font-size:18px;"></div>

<script>

const products=[
{name:"Smart Watch",price:999},
{name:"Headphones",price:799},
{name:"T-Shirt",price:499},
{name:"Beauty Kit",price:699},
{name:"Shoes",price:1299},
{name:"Mobile Cover",price:299},
  ];

let cart=[];

function showProducts(list){

let html="";

list.forEach((p)=>{

html+=`
<div style="background:white;width:220px;padding:15px;border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);text-align:center;">

<img src="https://picsum.photos/200"
style="width:100%;border-radius:10px;">

<h3>${p.name}</h3>

<p style="font-size:20px;color:#0d6efd;">₹${p.price}</p>

<button onclick="addCart('${p.name}',${p.price})"
style="background:#0d6efd;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;">
Add to Cart
</button>

<br><br>

<a href="https://wa.me/91YOURNUMBER?text=I want to buy ${p.name}">
Order WhatsApp
</a>

</div>
`;
});

document.getElementById("products").innerHTML=html;

}

function addCart(name,price){

cart.push({name,price});

let total=0;

cart.forEach(item=>total+=item.price);

document.getElementById("cart").innerHTML=
`Items: ${cart.length}<br>Total: ₹${total}`;

}

showProducts(products);
  document.getElementById("search").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const result=products.filter(p=>
p.name.toLowerCase().includes(value)
);

showProducts(result);

});

</script>

</body>
</html>
